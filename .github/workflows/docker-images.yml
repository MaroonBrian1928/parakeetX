name: Build and publish Docker images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and publish ${{ matrix.variant }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            dockerfile: Dockerfile.cpu
            cache-mode: max
            build-args: ""
          - variant: cuda
            dockerfile: Dockerfile.cuda
            cache-mode: min
            build-args: |
              UV_TORCH_INSTALL_FLAGS=--no-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: image
        shell: bash
        run: |
          image_name="${IMAGE_NAME,,}"
          echo "name=${REGISTRY}/${image_name}" >> "${GITHUB_OUTPUT}"

      - name: Free disk space for CUDA image build
        if: matrix.variant == 'cuda'
        shell: bash
        run: |
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          sudo docker system prune --all --force
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.variant }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ matrix.variant }}
            ${{ steps.image.outputs.name }}:${{ matrix.variant }}-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=ParakeetX API Server (${{ matrix.variant }})
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=${{ matrix.cache-mode }},scope=${{ matrix.variant }}
