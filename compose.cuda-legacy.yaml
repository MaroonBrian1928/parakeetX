services:
  api-cuda-legacy:
    image: ghcr.io/maroonbrian1928/parakeetx:cuda-legacy
    build:
      context: .
      dockerfile: Dockerfile.cuda-legacy
    env_file:
      - .env
    environment:
      PARAKEET__DEVICE: ${PARAKEET__DEVICE_CUDA:-cuda}
      DIARIZATION__DEVICE: ${DIARIZATION__DEVICE_CUDA:-cpu}
      PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
    ports:
      - "${HOST_PORT:-7474}:${UVICORN_PORT:-7474}"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
